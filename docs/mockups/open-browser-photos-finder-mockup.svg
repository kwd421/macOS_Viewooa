<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <linearGradient id="windowBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f2f2f"/>
      <stop offset="1" stop-color="#1f1f1f"/>
    </linearGradient>
    <linearGradient id="contentBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#292929"/>
      <stop offset="1" stop-color="#242424"/>
    </linearGradient>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#efefef" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d8d8d8" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="folder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67d0ff"/>
      <stop offset="1" stop-color="#27a7ef"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif; }
      .label { fill: #f5f5f5; font-size: 16px; font-weight: 650; }
      .muted { fill: #b9b9b9; font-size: 13px; font-weight: 500; }
      .tiny { fill: #a9a9a9; font-size: 11px; font-weight: 550; }
      .sidebarText { fill: #e8e8e8; font-size: 14px; font-weight: 600; }
      .section { fill: #9d9d9d; font-size: 11px; font-weight: 750; letter-spacing: 0.05em; }
      .callout { fill: #f2f2f2; font-size: 14px; font-weight: 650; }
      .calloutSmall { fill: #d0d0d0; font-size: 12px; font-weight: 500; }
    </style>
  </defs>

  <rect width="1500" height="980" rx="34" fill="#111"/>

  <g transform="translate(42 42)">
    <text x="0" y="0" class="label" font-size="22">Viewooa 자체 파인더 redesign mockup</text>
    <text x="0" y="28" class="muted">Photos 상단 구조 + Finder 사이드바/경로/상태바를 합친 방향</text>
  </g>

  <g transform="translate(42 92)" filter="url(#softShadow)">
    <rect width="1416" height="826" rx="28" fill="url(#windowBg)" stroke="#5a5a5a" stroke-opacity="0.50"/>

    <!-- native titlebar zone -->
    <rect x="0" y="0" width="1416" height="64" rx="28" fill="#3a3a3a" opacity="0.72"/>
    <circle cx="28" cy="31" r="9" fill="#ff5f57"/>
    <circle cx="56" cy="31" r="9" fill="#ffbd2e"/>
    <circle cx="84" cy="31" r="9" fill="#28c840"/>
    <text x="124" y="37" class="label" font-size="15">Downloads</text>
    <text x="220" y="37" class="muted">59 items</text>

    <!-- sidebar -->
    <rect x="0" y="64" width="186" height="710" fill="url(#sidebarBg)"/>
    <line x1="186" y1="64" x2="186" y2="774" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="16" y="84" width="154" height="34" rx="12" fill="#ffffff" opacity="0.09"/>
    <text x="26" y="106" class="sidebarText">⌂  Home</text>
    <text x="22" y="148" class="section">FAVORITES</text>
    <rect x="16" y="164" width="154" height="34" rx="9" fill="#0a84ff" opacity="0.92"/>
    <text x="26" y="186" fill="#fff" font-size="14" font-weight="700">⇩  Downloads</text>
    <text x="26" y="224" class="sidebarText">▣  Desktop</text>
    <text x="26" y="262" class="sidebarText">▤  Documents</text>
    <text x="26" y="300" class="sidebarText">▧  Pictures</text>
    <text x="22" y="350" class="section">LOCATIONS</text>
    <text x="26" y="386" class="sidebarText">☁  iCloud Drive</text>
    <text x="26" y="424" class="sidebarText">⌂  seinel</text>
    <text x="26" y="462" class="sidebarText">▱  Macintosh HD</text>
    <text x="22" y="512" class="section">CUSTOM</text>
    <text x="26" y="548" class="sidebarText">＋ Add Current Folder</text>
    <text x="18" y="742" class="tiny">Resizable 100–320px · default 186px</text>

    <!-- content -->
    <rect x="186" y="64" width="1230" height="710" fill="url(#contentBg)"/>

    <!-- Photos-like floating toolbar integrated with titlebar/content -->
    <g transform="translate(220 18)">
      <rect width="108" height="44" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="21" y="28" class="label" font-size="18">‹</text>
      <line x1="54" y1="10" x2="54" y2="34" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="75" y="28" class="label" font-size="18">›</text>
    </g>
    <g transform="translate(706 18)">
      <rect width="172" height="44" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="9" y="7" width="30" height="30" rx="10" fill="#ffffff" opacity="0.13"/>
      <text x="17" y="28" class="label" font-size="15">▦</text>
      <text x="55" y="28" class="label" font-size="15">☰</text>
      <line x1="86" y1="10" x2="86" y2="34" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="103" y="28" class="label" font-size="15">▥</text>
      <text x="136" y="28" class="label" font-size="15">▭</text>
    </g>
    <g transform="translate(904 18)">
      <rect width="64" height="44" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="20" y="28" class="label" font-size="15">▦⌄</text>
    </g>
    <g transform="translate(990 18)">
      <rect width="160" height="44" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="18" y="28" class="label" font-size="15">⇧</text>
      <text x="58" y="28" class="label" font-size="15">♡</text>
      <text x="98" y="28" class="label" font-size="15">↗</text>
      <text x="132" y="28" class="label" font-size="15">⋯</text>
    </g>
    <g transform="translate(1174 18)">
      <rect width="210" height="44" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="18" y="28" class="muted">⌕</text>
      <text x="44" y="28" class="muted">Search</text>
    </g>

    <!-- top title overlay inside content like Photos -->
    <text x="218" y="102" class="label" font-size="17">Downloads</text>
    <text x="218" y="124" class="muted">59 items · sort by name · icon view</text>

    <!-- grid folders/images -->
    <g transform="translate(238 150)">
      <g transform="translate(0 0)">
        <path d="M10 38 h42 l8 10 h96 q10 0 10 10 v72 q0 10-10 10 h-146 q-10 0-10-10 v-82 q0-10 10-10z" fill="url(#folder)" filter="url(#tinyShadow)"/>
        <text x="83" y="173" text-anchor="middle" class="label" font-size="14">raw test</text>
        <text x="83" y="193" text-anchor="middle" fill="#0a84ff" font-size="12" font-weight="700">28 items</text>
      </g>
      <g transform="translate(214 0)">
        <path d="M10 38 h42 l8 10 h96 q10 0 10 10 v72 q0 10-10 10 h-146 q-10 0-10-10 v-82 q0-10 10-10z" fill="url(#folder)" filter="url(#tinyShadow)"/>
        <text x="83" y="173" text-anchor="middle" class="label" font-size="14">screenshots</text>
        <text x="83" y="193" text-anchor="middle" fill="#0a84ff" font-size="12" font-weight="700">16 items</text>
      </g>
      <g transform="translate(428 0)">
        <path d="M10 38 h42 l8 10 h96 q10 0 10 10 v72 q0 10-10 10 h-146 q-10 0-10-10 v-82 q0-10 10-10z" fill="url(#folder)" filter="url(#tinyShadow)"/>
        <text x="83" y="173" text-anchor="middle" class="label" font-size="14">archive</text>
        <text x="83" y="193" text-anchor="middle" fill="#0a84ff" font-size="12" font-weight="700">13 items</text>
      </g>
      <g transform="translate(642 0)">
        <rect x="20" y="20" width="130" height="132" rx="15" fill="#f6d3c0" filter="url(#tinyShadow)"/>
        <rect x="28" y="28" width="114" height="82" rx="10" fill="#6d7f94"/>
        <rect x="38" y="116" width="94" height="12" rx="6" fill="#fff" opacity="0.75"/>
        <text x="85" y="173" text-anchor="middle" class="label" font-size="14">IMG_2041.png</text>
        <text x="85" y="193" text-anchor="middle" class="tiny">1122 × 1402</text>
      </g>
      <g transform="translate(856 0)">
        <rect x="20" y="20" width="130" height="132" rx="15" fill="#e8e8e8" filter="url(#tinyShadow)"/>
        <rect x="32" y="34" width="106" height="76" rx="8" fill="#c28b63"/>
        <rect x="50" y="118" width="72" height="12" rx="6" fill="#fff" opacity="0.8"/>
        <text x="85" y="173" text-anchor="middle" class="label" font-size="14">DSC_7216.NEF</text>
        <text x="85" y="193" text-anchor="middle" class="tiny">RAW preview</text>
      </g>

      <g transform="translate(0 250)">
        <rect x="-10" y="-4" width="188" height="214" rx="18" fill="#0a84ff" opacity="0.16" stroke="#0a84ff" stroke-opacity="0.75"/>
        <rect x="18" y="16" width="132" height="132" rx="15" fill="#dadada" filter="url(#tinyShadow)"/>
        <rect x="30" y="30" width="108" height="76" rx="8" fill="#957554"/>
        <text x="84" y="173" text-anchor="middle" class="label" font-size="14">selected.nef</text>
        <text x="84" y="193" text-anchor="middle" class="tiny">1 selected</text>
      </g>
      <g transform="translate(214 250)">
        <rect x="20" y="16" width="132" height="132" rx="15" fill="#e0e0e0" filter="url(#tinyShadow)"/>
        <rect x="34" y="34" width="104" height="82" rx="8" fill="#7aa8c8"/>
        <text x="86" y="173" text-anchor="middle" class="label" font-size="14">beach.jpg</text>
      </g>
      <g transform="translate(428 250)">
        <rect x="20" y="16" width="132" height="132" rx="15" fill="#ececec" filter="url(#tinyShadow)"/>
        <rect x="34" y="34" width="104" height="82" rx="8" fill="#bd775f"/>
        <text x="86" y="173" text-anchor="middle" class="label" font-size="14">portrait.heic</text>
      </g>
    </g>

    <!-- bottom path/status bar -->
    <rect x="0" y="774" width="1416" height="52" rx="0" fill="#2b2b2b"/>
    <line x1="0" y1="774" x2="1416" y2="774" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="20" y="786" width="850" height="28" rx="10" fill="#1f1f1f" opacity="0.75"/>
    <text x="36" y="805" class="muted">Macintosh HD › Users › seinel › Downloads</text>
    <text x="910" y="805" class="muted">1 of 59 selected · 80.37 GB available</text>
    <g transform="translate(1138 786)">
      <text x="0" y="20" class="label" font-size="18">−</text>
      <line x1="24" y1="14" x2="110" y2="14" stroke="#8a8a8a" stroke-width="4" stroke-linecap="round"/>
      <circle cx="76" cy="14" r="8" fill="#f0f0f0"/>
      <text x="126" y="20" class="label" font-size="18">＋</text>
    </g>
    <rect x="1270" y="784" width="58" height="32" rx="10" fill="#ffffff" opacity="0.12"/>
    <text x="1299" y="805" text-anchor="middle" class="label" font-size="14">Cancel</text>
    <rect x="1340" y="784" width="58" height="32" rx="10" fill="#0a84ff"/>
    <text x="1369" y="805" text-anchor="middle" fill="#fff" font-size="14" font-weight="750">Open</text>
  </g>

  <!-- annotations -->
  <g transform="translate(42 938)">
    <text x="0" y="0" class="callout">변경 방향:</text>
    <text x="92" y="0" class="calloutSmall">상단은 Photos처럼 titlebar 위 floating control groups · 좌측은 Finder 폭/밀도 · 폴더는 Finder 네이티브 · 하단은 Finder path/status + Open/Cancel</text>
  </g>
</svg>
